name: Fetch deals

on:
  schedule:
    - cron: "0 12 * * *" # once daily, matches api.lcbo.dev's own update cadence
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    # Exposed as job-level env so the `if:` condition below can check
    # presence via `env.*` -- `secrets.*` isn't a recognized named-value in
    # step `if:` conditions.
    env:
      BESTBUY_API_KEY: ${{ secrets.BESTBUY_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: node scripts/fetch-lcbo-stores.mjs
      - run: node scripts/fetch-lcbo-deals.mjs

      # Gated: skipped (not failed) until BESTBUY_API_KEY exists as a repo
      # secret (Best Buy support is parked -- see docs/roadmap.md). A
      # *failed* step here would abort the job before the commit step
      # below runs, breaking the LCBO refresh that works today; a *skipped*
      # step doesn't.
      - name: Fetch Best Buy deals
        if: env.BESTBUY_API_KEY != ''
        run: node scripts/fetch-bestbuy-deals.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/*.json
          git diff --cached --quiet || git commit -m "chore: update deals data"
          git push
