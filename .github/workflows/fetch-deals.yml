name: Fetch LCBO deals

on:
  schedule:
    - cron: "0 12 * * *" # once daily, matches api.lcbo.dev's own update cadence
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: node scripts/fetch-stores.mjs
      - run: node scripts/fetch-deals.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/stores.json public/data/deals.json public/data/price-history.json
          git diff --cached --quiet || git commit -m "chore: update LCBO deals data"
          git push
