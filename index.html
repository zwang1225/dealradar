<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BoozeRadar — Ontario alcohol deals tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <p class="eyebrow">🍷 Ontario</p>
    <h1>BoozeRadar</h1>
    <p class="subtitle">Tracking LCBO deals, stock, and drops across Ontario.</p>
  </header>

  <main>
    <section id="location">
      <p id="location-status" class="empty-state">Locating nearest store…</p>
      <button id="retry-location" type="button" hidden>Try location again</button>

      <label id="radius-label" hidden>
        Within
        <select id="radius-select" aria-label="Search radius">
          <option value="5">5 km</option>
          <option value="10" selected>10 km</option>
          <option value="25">25 km</option>
          <option value="50">50 km</option>
          <option value="100">100 km</option>
        </select>
      </label>
    </section>

    <section id="deals">
      <div class="deals-header">
        <h2>Deals</h2>
        <p id="results-count"></p>
      </div>

      <div id="filter-bar">
        <input id="search-input" type="search" placeholder="Search deals…" aria-label="Search deals" />

        <details id="category-picker" class="category-picker">
          <summary id="category-picker-summary">All categories</summary>
          <div id="category-tree" class="category-tree">
            <button type="button" class="category-option active" data-category="">All categories</button>
          </div>
        </details>
        <button id="favorite-category-button" type="button" title="Save as favorite category" disabled>☆</button>

        <select id="sort-select" aria-label="Sort deals">
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
          <option value="name-asc">Name: A to Z</option>
          <option value="in-stock" id="sort-in-stock-option" hidden>In Stock Near Me First</option>
        </select>
      </div>

      <div id="favorite-chips" class="favorite-chips" hidden></div>

      <p id="deals-status" class="empty-state">Loading deals…</p>
      <ul id="deals-list"></ul>
    </section>
  </main>

  <footer>
    <p>Not affiliated with LCBO. Data sourced independently.</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
