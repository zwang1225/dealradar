<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BoozeRadar — Ontario alcohol deals tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>BoozeRadar</h1>
    <p>Tracking LCBO deals, stock, and drops across Ontario.</p>
  </header>

  <main>
    <section id="location">
      <p id="location-status" class="empty-state">Locating nearest store…</p>
      <button id="retry-location" type="button" hidden>Try location again</button>
    </section>

    <section id="deals">
      <h2>Deals</h2>
      <p id="deals-status" class="empty-state">Loading deals…</p>
      <ul id="deals-list"></ul>
    </section>
  </main>

  <footer>
    <p>Not affiliated with LCBO. Data sourced independently.</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
